on: [push]

jobs:
  find-and-replace-job:
    runs-on: ubuntu-latest
    name: 'Find and replace on a string'
    steps:
      - uses: actions/checkout@v3
      - uses: flcdrg/replace-multiple-action@v1
        with:
          files: '**'
          find: '[{ "find": "KUIPER_DEV/", "replace": "KUIPER/" }]'