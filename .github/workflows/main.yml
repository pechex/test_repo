name: Project Change

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     
      - uses: actions/checkout@main
     
      - name: Find and Replace
        uses: thiagodnf/string-replacer@v1.0.2
        with:
          find: "KUIPER_DEV"
          replace: "KUIPER"
          include: |
            **
          exclude: |
            .git/**
            node_modules/**